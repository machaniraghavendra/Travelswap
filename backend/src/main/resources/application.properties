spring.application.name=travelswap-backend
server.port=8080

spring.datasource.url=${TRAVELSWAP_DB_URL:jdbc:postgresql://localhost:5432/travelswap}
spring.datasource.username=${TRAVELSWAP_DB_USERNAME:postgres}
spring.datasource.password=${TRAVELSWAP_DB_PASSWORD:serko}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

logging.level.com.travelswap=INFO
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=INFO

security.jwt.secret=${TRAVELSWAP_JWT_SECRET:travelswap-local-development-secret-key-with-32-bytes-minimum}
security.jwt.access-token-ttl-minutes=${TRAVELSWAP_ACCESS_TOKEN_TTL_MINUTES:20}
security.jwt.refresh-token-ttl-days=${TRAVELSWAP_REFRESH_TOKEN_TTL_DAYS:14}